<!DOCTYPE html>
<html>
<head>
    <title>Cart</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-5">
    <h2>Your Cart</h2>

    <table class="table">
        <thead>
            <tr>
                <th>Product</th>
                <th>Price</th>
                <th>Qty</th>
                <th>Total</th>
            </tr>
        </thead>

        <tbody>
            {% for item in items %}
            <tr>
                <td>{{ item.product.name }}</td>
                <td>₹ {{ item.product.price }}</td>
                <td>{{ item.quantity }}</td>
                <td>₹ {{ item.total_price }}</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>

    <h3>Total: ₹ {{ total }}</h3>

</div>

</body>
</html>
