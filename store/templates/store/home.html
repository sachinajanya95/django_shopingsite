{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>My Shop</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        body {
            background-color: #f1f3f6;
        }

        /* NAVBAR */
        .navbar {
            background-color: #2874f0;
        }

        .navbar-brand {
            font-weight: bold;
            font-size: 22px;
            color: white !important;
        }

        /* CARD */
        .product-card {
            background: white;
            border-radius: 10px;
            padding: 15px;
            transition: 0.3s;
            height: 100%;
        }

        .product-card:hover {
            box-shadow: 0 5px 20px rgba(0,0,0,0.15);
            transform: translateY(-5px);
        }

        .product-img {
            height: 180px;
            object-fit: contain;
        }

        .price {
            color: #388e3c;
            font-size: 18px;
            font-weight: bold;
        }

        .btn-cart {
            background-color: #ff9f00;
            color: white;
            font-weight: bold;
        }

        .btn-cart:hover {
            background-color: #fb8c00;
        }

        .title {
            font-weight: bold;
            font-size: 24px;
        }
    </style>
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg">
    <div class="container">
        <span class="navbar-brand">
            <i class="bi bi-cart"></i> MyShop
        </span>

        <div>
            <a href="/" class="btn btn-light me-2">Home</a>
            <a href="/cart/" class="btn btn-warning">
                <i class="bi bi-cart-fill"></i> Cart
            </a>
        </div>
    </div>
</nav>

<!-- CONTENT -->
<div class="container mt-4">

    <h3 class="title mb-4">🔥 Latest Products</h3>

    <div class="row g-4">

        {% for product in products %}
        <div class="col-md-4">

            <div class="product-card text-center">

                <!-- IMAGE -->
               {% if product.image %}
    <img src="{{ product.image.url }}" class="img-fluid product-img mb-3">
{% else %}
    <img src="https://via.placeholder.com/300" class="img-fluid product-img mb-3">
{% endif %}

                <!-- NAME -->
                <h5>{{ product.name }}</h5>

                <!-- PRICE -->
                <p class="price">₹ {{ product.price }}</p>

                <!-- BUTTON -->
                <a href="{% url 'add_to_cart' product.id %}"
                   class="btn btn-cart w-100">
                   🛒 Add to Cart
                </a>

            </div>

        </div>
        {% endfor %}

    </div>
</div>

</body>
</html>
